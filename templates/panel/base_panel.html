<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel</title>

    {% load static %}

    <!-- CSS tienda -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body class="panel-body">

<div class="panel-layout">

  <!-- SIDEBAR -->
  <nav class="panel-nav">
    <h2>Rara Panel</h2>

    <a href="/panel/">Dashboard</a>
    <a href="/panel/productos/">Productos</a>
    <a href="/">Ver tienda</a>
    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="btn-categoria" type="submit">Cerrar sesión</button>
    </form>
{% endif %}
  </nav>

  <!-- CONTENIDO -->
  <main class="panel-main">
    {% block content %}{% endblock %}
  </main>

</div>

</body>
</html>
