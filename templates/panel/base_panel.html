<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel</title>

    {% load static %}

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="panel-body">

<div class="panel-layout">

  <nav class="panel-nav">
    <h2><i class="fa-solid fa-crow"></i> Rara Panel</h2>

    <a href="/panel/"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="/panel/productos/"><i class="fa-solid fa-box-open"></i> Productos</a>
    <a href="/"><i class="fa-solid fa-store"></i> Ver tienda</a>
    
    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="btn-logout-clean" type="submit">
          <i class="fa-solid fa-power-off"></i> Cerrar sesión
        </button>
    </form>
    {% endif %}
  </nav>

  <main class="panel-main">
    {% block content %}{% endblock %}
  </main>

</div>

</body>
</html>
